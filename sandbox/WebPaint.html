share-title: Web Paint
share-description: A simple paint app using basic HTML
permalink: /WebPaint
full-width: true
---

<html>
  <head>
    <link rel="stylesheet" href="/assets/css/base.css">
  </head>
  <body>
    <script src="/assets/js/CanvasHelpers.js"></script>
    <script src="/assets/js/PaintColors.js"></script>
    <canvas id="canvas-view">
      Your browser does not seem to support HTML canvas.
    </canvas>
    <table style="width:90%">
      <tbody>
        <tr>
          <th style="width:10%" id="pallete-0"></th>
          <th style="width:10%" id="pallete-1"></th>
          <th style="width:10%" id="pallete-2"></th>
          <th style="width:10%" id="pallete-3"></th>
          <th style="width:10%" id="pallete-4"></th>
          <th style="width:10%" id="pallete-5"></th>
          <th style="width:10%" id="pallete-6"></th>
          <th style="width:10%" id="pallete-7"></th>
          <th style="width:10%" id="pallete-8"></th>
          <th style="width:10%" id="pallete-9"></th>
        </tr>
      </tbody>
    </table>
    <table style="width:90%">
      <tbody>
        <tr>
          <th style="width:10%"></th>
          <th style="width:10%"></th>
          <th style="width:80%"></th>
        </tr>
        <tr>
          <td id="red-preview"></td>
          <td id="red-text">0</td>
          <td><input id="red-slider" type="range" min="0" max="255" value="0"></td>
        </tr>
        <tr>
          <td id="green-preview"></td>
          <td id="green-text">0</td>
          <td><input id="green-slider" type="range" min="0" max="255" value="0"></td>
        </tr>
        <tr>
          <td id="blue-preview"></td>
          <td id="blue-text">0</td>
          <td><input id="blue-slider" type="range" min="0" max="255" value="0"></td>
        </tr>
      </tbody>
    </table>

    <div class="flex">
      <p id="pen-size-text">
        Pen Size: 50
      </p>
      <input id="pen-size-slider" type="range" min="1" max="100" value="50">
    </div>
    <div class="flex">
      <p>
        Use Grid
      </p>
      <input id="use-grid" type="checkbox">
    </div>
    <div class="flex" id="width">
      <p>
        Canvas Width: 
      </p>
      <input id="width-text" type="text">
      <select id="width-type">
        <option value="%">%</option>
        <option value="px">px</option>
      </select>
    </div>
    <div class="flex" id="height">
      <p>
        Canvas Height: 
      </p>
      <input id="height-text" type="text">
      <select id="height-type">
        <option value="%">%</option>
        <option value="px">px</option>
      </select>
    </div>
    <button id="export">Export</button>
    
    <script>
        function dqsValue(selector)
        {
          return document.querySelector(selector).value;
        }
        
        // Canvas Size
        function SetupCanvasSizeElements(dim)
        {
          const text = document.querySelector(`#${dim}-text`);
          if (!localStorage[dim])
          {
            localStorage[dim] = 0.6;
          }
          text.value = localStorage[dim];

          const select = document.querySelector(`#${dim}-type`);
          if (!localStorage[`${dim}Type`])
          {
            localStorage[`${dim}Type`] = "%";
          }
          select.value = localStorage[`${dim}Type`];
        }
        SetupCanvasSizeElements("width");
        SetupCanvasSizeElements("height");

        function onCanvasSizeChanged()
        {
          const params = {
            width: dqsValue("#width-text"),
            widthType: dqsValue("#width-type"),
            height: dqsValue("#height-text"),
            heightType: dqsValue("#height-type")
          }

          if (params.width && params.widthType && params.height && params.heightType)
          {
            localStorage.width = params.width;
            localStorage.widthType = params.widthType;
            localStorage.height = params.height;
            localStorage.heightType = params.heightType;
            Resize(params);
          }
        }
        
        document.querySelector("#width-text").oninput = onCanvasSizeChanged;
        document.querySelector("#width-type").oninput = onCanvasSizeChanged;
        document.querySelector("#height-text").oninput = onCanvasSizeChanged;
        document.querySelector("#height-type").oninput = onCanvasSizeChanged;

        // Initialize canvas
        Initialize({canvasId: "canvas-view", 
            withStateCache: true,
            width: dqsValue("#width-text"),
            widthType: dqsValue("#width-type"),
            height: dqsValue("#height-text"),
            heightType: dqsValue("#height-type"),
            drawFn: ()=>{
            if (MouseState.bPressed)
            {
              DrawRect({size: localStorage.penSize,
                   fillStyle: rgbToHex(dqsValue('#red-slider'), dqsValue('#green-slider'), dqsValue('#blue-slider')),
                    bUseGrid: document.querySelector("#use-grid").checked});
            }
        }});

        // Pen Size
        const penSizeSlider = document.querySelector("#pen-size-slider");
        if (!localStorage.penSize)
        {
          localStorage.penSize = 50;
        }
        else
        {
          penSizeSlider.value = localStorage.penSize;
          document.querySelector("#pen-size-text").textContent = `Pen Size: ${localStorage.penSize}`;
        }

        penSizeSlider.oninput = function() {
          localStorage.penSize = this.value;
          document.querySelector("#pen-size-text").textContent = `Pen Size: ${localStorage.penSize}`;
        }

        // Use Grid
        document.querySelector("#use-grid").checked = localStorage.bUseGrid == "1";
        document.querySelector("#use-grid").oninput = function(){
          localStorage.bUseGrid = this.checked ? "1" : "0";
        }
        
        // Color Sliders and Palletes
        SetupPallete();
        SetupColorSliders();

        // Export
        document.querySelector("#export").onclick = function()
        {
          Canvas.toBlob((blob) => window.open(URL.createObjectURL(blob), '_blank'));
        }

    </script>
  </body>
</html>
