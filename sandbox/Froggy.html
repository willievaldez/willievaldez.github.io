share-title: Froggy
share-description: Live your best frog life catching flies!
permalink: /Froggy
full-width: true
---

<html>
  <head>
    <link rel="stylesheet" href="/assets/css/base.css">
  </head>
  <body>
    <script src="/assets/js/CanvasHelpers.js"></script>
    <script src="/assets/js/PaintColors.js"></script>
    <script src="/assets/js/Froggy.js"></script>

    <img id="background" src="/assets/img/background2.png" hidden>
    <img id="frog" src="/assets/img/whites_tree_frog.png" hidden>
    <img id="fly" src="/assets/img/fly.png" hidden>

    <img id="title" src="/assets/img/title.png" hidden>
    <img id="cursor" src="/assets/img/cursor.png" hidden>
    <img id="empty" src="/assets/img/empty.png" hidden>
    <img id="settings" src="/assets/img/gear.png" hidden>
    <img id="music-ico" src="/assets/img/music.png" hidden>
    <img id="no-music-ico" src="/assets/img/no_music.png" hidden>
    <img id="sfx-ico" src="/assets/img/sound.png" hidden>
    <img id="no-sfx-ico" src="/assets/img/no_sound.png" hidden>
    <img id="delete" src="/assets/img/no_save.png" hidden>
    <img id="accept" src="/assets/img/accept.png" hidden>
    <img id="cancel" src="/assets/img/cancel.png" hidden>
    
    <img id="num-0" src="/assets/img/alphanum/0.png" hidden>
    <img id="num-1" src="/assets/img/alphanum/1.png" hidden>
    <img id="num-2" src="/assets/img/alphanum/2.png" hidden>
    <img id="num-3" src="/assets/img/alphanum/3.png" hidden>
    <img id="num-4" src="/assets/img/alphanum/4.png" hidden>
    <img id="num-5" src="/assets/img/alphanum/5.png" hidden>
    <img id="num-6" src="/assets/img/alphanum/6.png" hidden>
    <img id="num-7" src="/assets/img/alphanum/7.png" hidden>
    <img id="num-8" src="/assets/img/alphanum/8.png" hidden>
    <img id="num-9" src="/assets/img/alphanum/9.png" hidden>

    <div id="music">
      <audio id="ambient-music" src="/assets/audio/bg_music.wav" type="audio/wav" loop></audio>
    </div>
    <div id="sfx">
      <audio id="tongue-launch" src="/assets/audio/tongue_launch.wav" type="audio/wav"></audio>
      <audio id="tongue-hit" src="/assets/audio/tongue_hit.wav" type="audio/wav"></audio>
    </div>

    <canvas id="canvas-view" style="cursor: none">
      Your browser does not seem to support HTML canvas.
    </canvas>
    <div id="debug" hidden>
      <p id="tick">0ms</p>
    </div>
    
    <script>
        // Initialize the canvas
        Initialize({canvasId: "canvas-view", width: 0.9, height: 0.8, widthRatio: 4, heightRatio: 3, drawFn: Update, onClick: OnClick, customCursor: {src: document.getElementById("cursor"), canvasWidthRatio: 0.05} });
        
        function ToggleMute(soundName, bMuted, volume=1.0)
        {
            const soundDiv = document.getElementById(soundName);
            localStorage[`${soundName}-muted`] = bMuted;
            for (const child of soundDiv.children)
            {
              child.volume = volume;
              child.muted = bMuted;
            }

            const button = GetButton(soundName);
            if (button)
            {
              button.src = bMuted ? document.getElementById(`no-${soundName}-ico`) : document.getElementById(`${soundName}-ico`);
            }
        }

        // State management
        let currState = "";
        function ChangeState(newState)
        {
          const prevState = currState;
          currState = newState;

          if (prevState == "Settings")
          {
            RemoveButton("music");
            RemoveButton("sfx");
            RemoveButton("delete");
          }

          if (currState == "Init" && prevState != "Settings")
          {
            ToggleMute("music", localStorage["music-muted"] == 'true', 0.2);
            ToggleMute("sfx", localStorage["sfx-muted"] == 'true', 0.6);

            flies.add(1, {xmin: 0.7, xmax: 0.7, ymin: 0.6, ymax: 0.6, dir: 0.0, onCaught: function(){ChangeState("InGame");}});
          }
          else if (currState == "Settings")
          {
            AddButton("music",
              {src: localStorage["music-muted"] == 'true' ? document.getElementById("no-music-ico") : document.getElementById("music-ico"),
                x: 0.1, y: 0.1, canvasWidthRatio: 0.05, toggleState: localStorage["music-muted"] == 'true'},
              function() {ToggleMute("music", this.toggleState);});
            AddButton("sfx",
              {src: localStorage["sfx-muted"] == 'true' ? document.getElementById("no-sfx-ico") : document.getElementById("sfx-ico"),
                x: 0.1, y: 0.2, canvasWidthRatio: 0.05, toggleState: localStorage["sfx-muted"] == 'true'},
              function() {ToggleMute("sfx", this.toggleState);});
            AddButton("delete", {src: document.getElementById("delete"), x: 0.05, y: 0.85, canvasWidthRatio: 0.05},
              function() {
                const cachedFlyCount = localStorage.flyCount;
                localStorage.flyCount = "0";
                AddButton("accept", {src: document.getElementById("accept"), x: 0.15, y: 0.85, canvasWidthRatio: 0.05},
                  function() {
                    RemoveButton("accept");
                    RemoveButton("cancel");
                  });
                AddButton("cancel", {src: document.getElementById("cancel"), x: 0.25, y: 0.85, canvasWidthRatio: 0.05},
                  function() {
                    localStorage.flyCount = cachedFlyCount;
                    RemoveButton("accept");
                    RemoveButton("cancel");
                  });
              });
          }
          else if (currState == "InGame" && prevState != "Settings")
          {
            document.getElementById("ambient-music").play();

            for (let i = 0; i < 10; ++i)
            {
              setTimeout(function(){flies.add(1);}, i * 1000);
            }
          }
        }

        // Initialize the game loop
        ChangeState("Init");

        // Add some persistent buttons
        AddButton("Debug", {src: document.getElementById("empty"), x: 0.0, y: 0.0, canvasWidthRatio: 0.05}, function() {
                      const debugDiv = document.getElementById("debug");
                      debugDiv.hidden = !debugDiv.hidden;
                    });

        let cachedState = null;
        AddButton("Settings", {src: document.getElementById("settings"), x: 0.95, y: 0.95, canvasWidthRatio: 0.05, toggleState: false}, function() {
                      if (currState != "Settings")
                      {
                        cachedState = currState;
                        ChangeState("Settings");
                      }
                      else
                      {
                        ChangeState(cachedState);
                      }
                    });


        function Update(deltaTimeMS)
        {
          // Debug info
          document.getElementById("tick").textContent = deltaTimeMS;

          Ctx.reset();
          DrawBackground();
          DrawUI();
          DrawEntities(deltaTimeMS);
        }

        function DrawBackground()
        {
            DrawImage({src: document.getElementById("background"), x: 0.5, y: 0.5, canvasWidthRatio: 1.0, canvasHeightRatio: 1.0});
        }

        function DrawEntities(deltaTimeMS)
        {
          froggy.update(deltaTimeMS);
          if (currState != "Settings")
          {
            flies.update(deltaTimeMS);
          }
        }

        function DrawUI()
        {
          if (currState == "Init")
          {
            DrawImage({src: document.getElementById("title"), x: 0.5, y: 0.2, canvasWidthRatio: 0.8});
          }
          else
          {
            DrawScore(0.05, 0.95);
          }
        }

        function DrawScore(x, y)
        {
          if (!localStorage.flyCount)
          {
            localStorage.flyCount = "0";
          }
          
          for (let i = 0; i < localStorage.flyCount.length; i++)
          {
            DrawImage({src: document.getElementById(`num-${localStorage.flyCount[i]}`), x: x + (0.04 * i), y: y, canvasWidthRatio: 0.05});
          }
        }

        function OnClick() {
          froggy.tongue.shoot();
        }
    </script>
  </body>
</html>
