<html>
  <head>
    <link rel="stylesheet" href="/assets/css/base.css">
  </head>
  <body>
    <script src="/assets/js/CanvasHelpers.js"></script>
    <script src="/assets/js/PaintColors.js"></script>
    <script src="/assets/js/Froggy.js"></script>
    <img id="background" src="/assets/img/background2.png" hidden>
    <img id="title" src="/assets/img/title.png" hidden>
    <img id="frog" src="/assets/img/whites_tree_frog.png" hidden>
    <img id="fly" src="/assets/img/fly.png" hidden>
    <img id="play" src="/assets/img/play.png" hidden>
    <canvas id="canvas-view" style="cursor: none">
      Your browser does not seem to support HTML canvas.
    </canvas>
    <div id="debug" hidden>
      <p id="tick">0ms</p>
      <p id="len_scr">0</p>
      <p id="len_world">0</p>
    </div>
    
    <script>
        Initialize({canvasId: "canvas-view", width: 0.9, height: 0.8, widthRatio: 4, heightRatio: 3, drawFn: Update, onClick: OnClick, customCursor: {src: document.getElementById("fly"), canvasWidthRatio: 0.05} });
        AddButton("Debug", {src: document.getElementById("fly"), x: 0.0, y: 0.0, canvasWidthRatio: 0.05}, function() {
                      const debugDiv = document.getElementById("debug");
                      debugDiv.hidden = !debugDiv.hidden;
                    });

        let currState = "";
        function ChangeState(newState)
        {
          if (currState == "Init")
          {
            RemoveButton("Play");
          }

          currState = newState;
          if (currState == "Init")
          {
            AddButton("Play", {src: document.getElementById("play"), x: 0.7, y: 0.6, canvasWidthRatio: 0.4}, function() {
              ChangeState("InGame");
            });
          }
          else if (currState == "InGame")
          {
            flies.add(1, 0.2, 0.8, 0.1, 0.5);
          }
        }

        ChangeState("Init");

        function Update(deltaTimeMS)
        {
          document.getElementById("tick").textContent = deltaTimeMS;

          Ctx.reset();
          DrawBackground();
          DrawUI();
          DrawEntities();
        }

        function DrawBackground()
        {
            DrawImage({src: document.getElementById("background"), x: 0.5, y: 0.5, canvasWidthRatio: 1.0, canvasHeightRatio: 1.0});
        }

        function DrawEntities()
        {
            froggy.update();
            flies.update();
        }

        function DrawUI()
        {
          if (currState == "Init")
          {
            DrawImage({src: document.getElementById("title"), x: 0.5, y: 0.2, canvasWidthRatio: 0.8});
          }
        }

        function OnClick() {
          froggy.tongue.shoot();
        }
    </script>
  </body>
</html>
